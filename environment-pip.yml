name: nostdiffad
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - --index-url=https://download.pytorch.org/whl/cu121
      - torch==2.5.1
      - torchvision==0.20.1
      - --extra-index-url=http://mirrors.aliyun.com/pypi/simple
      - --trusted-host=mirrors.aliyun.com
      - numpy>=1.24
      - pillow>=9.0
      - pyyaml>=6.0
      - scikit-learn>=1.2
      - scipy>=1.10
      - tqdm>=4.64
      - pytest>=7
      - timm>=0.9
      - transformers>=4.40
      - -e .
