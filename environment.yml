name: nostdiffad
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  - numpy
  - pillow
  - pyyaml
  - scikit-learn
  - scipy
  - tqdm
  - pytest
  - pip:
      - timm>=0.9
      - transformers>=4.40
      - -e .
